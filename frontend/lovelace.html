<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lovelace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="page-shell right-collapsed" id="pageShell">
    <div class="panel-controls" aria-label="Layout controls">
      <button class="panel-toggle" id="leftPanelToggle" type="button" aria-label="Hide left panel"
        title="Hide left panel">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="5" width="18" height="14" rx="2"></rect>
          <path d="M9 5v14"></path>
          <path d="M7 12h-2"></path>
        </svg>
      </button>
      <button class="panel-toggle" id="rightPanelToggle" type="button" aria-label="Hide right panel"
        title="Hide right panel">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="5" width="18" height="14" rx="2"></rect>
          <path d="M15 5v14"></path>
          <path d="M19 12h-2"></path>
        </svg>
      </button>
    </div>

    <aside class="sidebar" id="leftPanel">
      <div class="panel-body panel-body-left">
        <div class="brand-card">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 64 64" role="img">
              <circle cx="32" cy="32" r="6" class="logo-core"></circle>
              <ellipse cx="32" cy="32" rx="22" ry="10" class="logo-orbit"></ellipse>
              <ellipse cx="32" cy="32" rx="22" ry="10" class="logo-orbit" transform="rotate(60 32 32)"></ellipse>
              <ellipse cx="32" cy="32" rx="22" ry="10" class="logo-orbit" transform="rotate(120 32 32)"></ellipse>
              <circle cx="52" cy="32" r="3" class="logo-node"></circle>
              <circle cx="22" cy="15" r="3" class="logo-node"></circle>
              <circle cx="23" cy="49" r="3" class="logo-node"></circle>
            </svg>
          </div>
          <div class="brand-text">
            <p class="eyebrow">Project Lovelace</p>
            <h1>Lovelace</h1>
            <p class="brand-copy">Agentic AI workspace for scientific thinking, discovery, and structured answers.</p>
          </div>
        </div>

        <button class="primary-action" type="button">+ New Conversation</button>

        <section class="sidebar-section">
          <p class="history-label">Recent</p>
          <div class="history-list">
            <div class="history-row">
              <button class="history-topic selected" type="button">
                <span class="history-dot"></span>
                <span>Quantum battery materials</span>
              </button>
              <div class="history-actions">
                <button class="history-more" type="button" aria-label="Conversation options" aria-haspopup="true"
                  aria-expanded="false">
                  <svg viewBox="0 0 20 20" aria-hidden="true">
                    <circle cx="5" cy="10" r="1.5"></circle>
                    <circle cx="10" cy="10" r="1.5"></circle>
                    <circle cx="15" cy="10" r="1.5"></circle>
                  </svg>
                </button>
                <div class="history-menu" hidden>
                  <button type="button">Share conversation</button>
                  <button type="button">Pin</button>
                  <button type="button">Rename</button>
                  <button type="button">Delete</button>
                </div>
              </div>
            </div>
            <div class="history-row">
              <button class="history-topic" type="button">
                <span class="history-dot"></span>
                <span>CRISPR delivery systems review</span>
              </button>
              <div class="history-actions">
                <button class="history-more" type="button" aria-label="Conversation options" aria-haspopup="true"
                  aria-expanded="false">
                  <svg viewBox="0 0 20 20" aria-hidden="true">
                    <circle cx="5" cy="10" r="1.5"></circle>
                    <circle cx="10" cy="10" r="1.5"></circle>
                    <circle cx="15" cy="10" r="1.5"></circle>
                  </svg>
                </button>
                <div class="history-menu" hidden>
                  <button type="button">Share conversation</button>
                  <button type="button">Pin</button>
                  <button type="button">Rename</button>
                  <button type="button">Delete</button>
                </div>
              </div>
            </div>
            <div class="history-row">
              <button class="history-topic" type="button">
                <span class="history-dot"></span>
                <span>Nanoparticle toxicity summary</span>
              </button>
              <div class="history-actions">
                <button class="history-more" type="button" aria-label="Conversation options" aria-haspopup="true"
                  aria-expanded="false">
                  <svg viewBox="0 0 20 20" aria-hidden="true">
                    <circle cx="5" cy="10" r="1.5"></circle>
                    <circle cx="10" cy="10" r="1.5"></circle>
                    <circle cx="15" cy="10" r="1.5"></circle>
                  </svg>
                </button>
                <div class="history-menu" hidden>
                  <button type="button">Share conversation</button>
                  <button type="button">Pin</button>
                  <button type="button">Rename</button>
                  <button type="button">Delete</button>
                </div>
              </div>
            </div>
            <div class="history-row">
              <button class="history-topic" type="button">
                <span class="history-dot"></span>
                <span>Fusion reactor literature map</span>
              </button>
              <div class="history-actions">
                <button class="history-more" type="button" aria-label="Conversation options" aria-haspopup="true"
                  aria-expanded="false">
                  <svg viewBox="0 0 20 20" aria-hidden="true">
                    <circle cx="5" cy="10" r="1.5"></circle>
                    <circle cx="10" cy="10" r="1.5"></circle>
                    <circle cx="15" cy="10" r="1.5"></circle>
                  </svg>
                </button>
                <div class="history-menu" hidden>
                  <button type="button">Share conversation</button>
                  <button type="button">Pin</button>
                  <button type="button">Rename</button>
                  <button type="button">Delete</button>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="sidebar-section sidebar-gap" aria-hidden="true"></section>
      </div>
    </aside>

    <main class="chat-stage is-empty-state" id="chatStage">
      <section class="chat-intro" id="chatIntro" aria-label="Lovelace intro">
        <div class="intro-logo" aria-hidden="true">
          <svg viewBox="0 0 64 64" role="img">
            <circle cx="32" cy="32" r="6" class="logo-core"></circle>
            <ellipse cx="32" cy="32" rx="22" ry="10" class="logo-orbit"></ellipse>
            <ellipse cx="32" cy="32" rx="22" ry="10" class="logo-orbit" transform="rotate(60 32 32)"></ellipse>
            <ellipse cx="32" cy="32" rx="22" ry="10" class="logo-orbit" transform="rotate(120 32 32)"></ellipse>
            <circle cx="52" cy="32" r="3" class="logo-node"></circle>
            <circle cx="22" cy="15" r="3" class="logo-node"></circle>
            <circle cx="23" cy="49" r="3" class="logo-node"></circle>
          </svg>
        </div>
        <h2>Lovelace</h2>
      </section>

      <section class="chat-window is-empty" id="chatWindow" aria-label="Conversation"></section>

      <form class="composer" id="composer">
        <div class="composer-top">
          <div class="composer-toolbar">
            <div class="composer-tools">
              <button class="icon-tool plain-icon" type="button" aria-label="Add attachments" title="Add attachments">
                <span>+</span>
              </button>
              <div class="agent-selector">
                <button class="icon-tool plain-icon agent-trigger" id="agentTrigger" type="button"
                  aria-label="Select agent" aria-haspopup="true" aria-expanded="false" title="Select agent">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M5 7h6"></path>
                    <path d="M15 7h4"></path>
                    <path d="M5 17h10"></path>
                    <path d="M19 17h0"></path>
                    <circle cx="13" cy="7" r="2"></circle>
                    <circle cx="17" cy="17" r="2"></circle>
                  </svg>
                </button>
                <div class="agent-menu" id="agentMenu" hidden>
                  <button class="agent-option" type="button" data-mode="Deep Search">Deep research</button>
                </div>
              </div>
            </div>

            <div class="mode-chip-inline" id="modeChipInline" hidden>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="6"></circle>
                <path d="M15.5 15.5L20 20"></path>
                <path d="M7.5 11h2.5"></path>
                <path d="M8.75 9.75v2.5"></path>
                <path d="M12.75 8.25h2.5"></path>
                <path d="M14 7v2.5"></path>
              </svg>
              <span>Deep research</span>
              <button class="mode-chip-close" id="modeChipClose" type="button" aria-label="Cancel deep research">
                <svg viewBox="0 0 20 20" aria-hidden="true">
                  <path d="M5 5l10 10"></path>
                  <path d="M15 5L5 15"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>
        <label class="composer-box" for="promptInput">
          <textarea id="promptInput" rows="1"
            placeholder="Ask Lovelace a science question, request a comparison, or trigger deep search..."></textarea>
          <button class="send-button" type="submit" aria-label="Send message" title="Send message">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 20L20 12L4 4L7.5 12L4 20Z"></path>
            </svg>
          </button>
        </label>
      </form>
      <p class="composer-note">Lovelace is an AI and can make mistakes</p>
    </main>

    <aside class="control-panel" id="rightPanel">
      <div class="panel-body panel-body-right">
        <section class="profile-card">
          <div class="profile-head">
            <div class="profile-avatar">AK</div>
            <div>
              <p class="profile-kicker">Profile</p>
              <h2>Research Lead</h2>
              <p class="profile-meta">Project Lovelace Workspace</p>
            </div>
          </div>
        </section>

        <section class="account-card">
          <p class="profile-kicker">Account</p>
          <div class="account-list">
            <button class="account-item" type="button">
              <span>Manage your account</span>
              <span class="account-arrow">></span>
            </button>
            <button class="account-item" type="button">
              <span>Sign out</span>
              <span class="account-arrow">></span>
            </button>
            <button class="account-item" type="button">
              <span>Privacy policy</span>
              <span class="account-arrow">></span>
            </button>
            <button class="account-item" type="button">
              <span>Terms of service</span>
              <span class="account-arrow">></span>
            </button>
          </div>
        </section>

      </div>
    </aside>
  </div>

  <script src="script.js"></script>
</body>

</html>
